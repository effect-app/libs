name: Snapshot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CI: true

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      run_build: false

  snapshot:
    name: Publish Snapshot
    needs: [ci]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: update versions')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Determine snapshot tags
        id: tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SNAPSHOT_ID="pr-${{ github.event.pull_request.number }}"
          else
            SNAPSHOT_ID="snapshot"
          fi
          echo "snapshot_id=$SNAPSHOT_ID" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Exit Changesets pre mode for snapshots
        shell: bash
        run: |
          if [ -f .changeset/pre.json ]; then
            pnpm changeset pre exit
          fi

      - name: Create snapshot versions
        run: pnpm changeset version --snapshot ${{ steps.tags.outputs.snapshot_id }}

      - name: Build
        run: pnpm build

      - name: Publish snapshots to pkg.pr.new
        id: publish
        run: pnpm exec pkg-pr-new publish ./packages/*

      - name: Write snapshot usage summary
        id: usage
        shell: bash
        run: |
          PACKAGE_LOCATORS="${{ steps.publish.outputs.packages }}"
          PACKAGE_URLS="${{ steps.publish.outputs.urls }}"
          PUBLISHED_SHA="${{ steps.publish.outputs.sha }}"
          if [ -z "$PACKAGE_LOCATORS" ] || [ -z "$PACKAGE_URLS" ] || [ -z "$PUBLISHED_SHA" ]; then
            echo "pkg-pr-new did not return expected outputs (packages/urls/sha)" >&2
            exit 1
          fi

          {
            echo "## Snapshot publish complete"
            echo
            echo "- SHA: \`${PUBLISHED_SHA}\`"
            echo
            echo "Published via pkg.pr.new."
            echo
            echo "### Install package locators"
            echo "\`\`\`bash"
            echo "$PACKAGE_LOCATORS"
            echo "\`\`\`"
            echo
            echo "### Package URLs"
            echo "\`\`\`text"
            echo "$PACKAGE_URLS"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo "package_locators<<EOF"
            echo "$PACKAGE_LOCATORS"
            echo "EOF"
            echo "package_urls<<EOF"
            echo "$PACKAGE_URLS"
            echo "EOF"
            echo "published_sha=$PUBLISHED_SHA"
          } >> "$GITHUB_OUTPUT"
